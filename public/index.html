<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Warlocks</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0b12; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; cursor: crosshair; }
  #hud {
    position: fixed; top: 10px; left: 10px; color: #ddd; font-size: 14px;
    background: rgba(0,0,0,.45); padding: 8px 12px; border-radius: 8px; pointer-events: none;
  }
  #status {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 22px; font-weight: 600; text-shadow: 0 2px 6px #000; pointer-events: none;
  }
  #tuning {
    position: fixed; top: 10px; right: 10px; width: 230px; display: none;
    background: rgba(0,0,0,.65); color: #ddd; font-size: 12px;
    padding: 10px 14px 14px; border-radius: 8px;
  }
  #tuning label { display: block; margin-top: 8px; }
  #tuning span { color: #ffd54f; float: right; }
  #tuning input { width: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">WASD move &middot; hold LMB fireball &middot; RMB lightning &middot; F deflect &middot; hold Z shield &middot; E turret &middot; G dummy &middot; space dash &middot; R restart &middot; T tuning</div>
<div id="status"></div>
<div id="tuning"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

let myId = null;
let world = 1600, center = { x: 800, y: 800 }, playerR = 16, fireballR = 9;
let pillars = [];
let VISION_R = 650;
const fogCanvas = document.createElement('canvas');
const fctx = fogCanvas.getContext('2d');
const assets = { warlock: null, ready: false };
const SPRITE_W = 48, SPRITE_H = 48, WALK_FRAMES = 4;

async function loadImage(src) {
  const img = new Image();
  img.src = src;
  await img.decode();
  return img;
}
loadImage('assets/warlock_sheet.svg').then(img => {
  assets.warlock = img;
  assets.ready = true;
}).catch(() => loadImage('assets/warlock.svg').then(img => {
  assets.warlock = img;
  assets.ready = true;
})).catch(err => console.warn('Sprite load failed, using circle fallback:', err));

function playerFacing() {
  return -Math.PI / 2;
}

function playerAnimFrame(p, mine) {
  const snap = snaps[snaps.length - 1];
  const raw = snap && snap.players.find(pl => pl.id === p.id);
  const vx = raw?.vx ?? 0, vy = raw?.vy ?? 0;
  const speed = Math.hypot(vx, vy);
  let moving = speed > 28;
  if (mine && (keys.up || keys.down || keys.left || keys.right) && !chargeHeld) moving = true;
  if (!moving) return 0;
  const interval = Math.max(75, 130 - speed * 0.12);
  return Math.floor(performance.now() / interval) % WALK_FRAMES;
}

function drawWarlock(x, y, angle, frame, mine, alpha) {
  const img = assets.warlock;
  const size = playerR * 2.9;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  if (img) {
    ctx.rotate(angle + Math.PI / 2);
    ctx.imageSmoothingEnabled = false;
    const sheet = img.width >= SPRITE_W * WALK_FRAMES;
    if (sheet) {
      ctx.drawImage(img, frame * SPRITE_W, 0, SPRITE_W, SPRITE_H, -size / 2, -size / 2, size, size);
    } else {
      ctx.drawImage(img, -size / 2, -size / 2, size, size);
    }
  } else {
    ctx.beginPath();
    ctx.arc(0, 0, playerR, 0, Math.PI * 2);
    ctx.fillStyle = mine ? '#4fc3f7' : '#b388ff';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#000';
    ctx.stroke();
  }
  ctx.restore();
}

// snapshot buffer for interpolation (render ~70ms in the past)
const INTERP_DELAY = 70;
const snaps = [];
let clockOffset = 0; // serverTime - clientTime

const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}`);

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.t === 'welcome') {
    myId = msg.id;
    world = msg.world; center = msg.center;
    playerR = msg.playerR; fireballR = msg.fireballR;
    pillars = msg.pillars || [];
    if (msg.visionR) VISION_R = msg.visionR;
    applyTuning(msg.tuning);
    if (msg.lightning) LIGHTNING_CD = msg.lightning.cd;
    if (msg.deflect) {
      DEFLECT_CD = msg.deflect.cd;
      DEFLECT_DURATION = msg.deflect.dur;
      DEFLECT_ARC = msg.deflect.arc;
      DEFLECT_REACH = msg.deflect.reach;
    }
    if (msg.turret) {
      TURRET_CD = msg.turret.cd;
      TURRET_INTERVAL = msg.turret.interval;
      TURRET_MAX = msg.turret.max;
      TURRET_R = msg.turret.r;
    }
    if (msg.dummy) {
      DUMMY_CD = msg.dummy.cd;
      DUMMY_MAX = msg.dummy.max;
      DUMMY_HP = msg.dummy.hp;
      DUMMY_R = msg.dummy.r;
    }
    if (msg.shield) {
      SHIELD_ARC = msg.shield.arc;
      SHIELD_LOCK = msg.shield.lock;
      SHIELD_KB_MULT = msg.shield.kb;
    }
  } else if (msg.t === 's') {
    msg.recv = performance.now();
    // smooth the offset so network jitter doesn't wobble the interpolation clock
    const sample = msg.now - Date.now();
    clockOffset = clockOffset === 0 ? sample : clockOffset * 0.95 + sample * 0.05;
    snaps.push(msg);
    if (snaps.length > 30) snaps.shift();
    const me = msg.players.find(p => p.id === myId);
    if (me && me.a) reconcile(me);
    // server confirmed one of our casts: pair the oldest ghost with it for blending
    const liveIds = new Set();
    for (const f of msg.fireballs) {
      liveIds.add(f.id);
      const g = ghostById.get(f.id);
      if (g && f.o !== myId) ghostById.delete(f.id);
      if (f.o === myId && !seenMyFireballs.has(f.id)) {
        seenMyFireballs.add(f.id);
        const g = ghosts.shift();
        // ghost already detonated on a wall locally: don't resurrect it,
        // and swallow the explosion when the server ball vanishes
        if (g && g.dead) hitIds.add(f.id);
        else if (g) ghostById.set(f.id, g);
      }
    }
    for (const h of (msg.hits || [])) {
      hitIds.add(h.fid);
      if (h.d) {
        ghostById.delete(h.fid);
        explosions.push({ x: h.x, y: h.y, at: performance.now() });
        continue;
      }
      const role = h.v === myId ? 'self' : (h.o === myId ? 'shoot' : 'spec');
      const m = { fid: h.fid, role, procAt: performance.now(), contactAt: null, boomAt: null, knockAt: null };
      if (role === 'shoot') {
        // own ball renders in real time along the ghost trajectory
        const g = ghostById.get(h.fid) || ghosts[0];
        if (g) m.contactAt = g.at + Math.hypot(h.x - g.x, h.y - g.y) / fireballSpeedAt(g.spd) * 1000;
      } else {
        // other balls render on the interp timeline: they cross the impact
        // point exactly when the render clock reaches the hit time
        const renderNow = Date.now() + clockOffset - INTERP_DELAY;
        m.contactAt = performance.now() + (msg.now - renderNow);
      }
      pendingMeasures.push(m);
      if (pendingMeasures.length > 40) pendingMeasures.shift();
      if (h.o === myId && !seenMyFireballs.has(h.fid)) { seenMyFireballs.add(h.fid); ghosts.shift(); }
      if (role !== 'spec') {
        // this fireball (or the victim: us) lives on the real-time timeline,
        // so react the moment the server tells us instead of waiting for interp
        ghostById.delete(h.fid);
        explosions.push({ x: h.x, y: h.y, at: performance.now() });
        m.boomAt = performance.now();
        m.knockAt = role === 'self' ? (performance.now() - lastJoltAt < 150 ? lastJoltAt : performance.now())
          : (role === 'shoot' ? m.boomAt : (performance.now() - lastJoltAt < 150 ? lastJoltAt : null));
        knocks.push({ v: h.v, kvx: h.dx * h.kb, kvy: h.dy * h.kb, hitTime: msg.now, visStart: performance.now() });
        if (h.v === myId) { jolts++; lastJoltAt = performance.now(); }
      } else {
        // spectated hit: both ball and victim are on the interp timeline,
        // so detonate exactly when the render clock reaches the hit
        scheduledHits.push({
          fid: h.fid, x: h.x, y: h.y, dx: h.dx, dy: h.dy, hitTime: msg.now,
          spd: (msg.fireballs.find(f => f.id === h.fid) || prevFireballs.find(f => f.id === h.fid) || {}).spd || 1
        });
      }
    }
    // a fireball that vanished between snapshots hit something (or fizzled)
    for (const f of prevFireballs) {
      if (liveIds.has(f.id)) continue;
      if (hitIds.delete(f.id)) continue; // already handled via hit event
      let ex = f.x, ey = f.y;
      const g = ghostById.get(f.id);
      if (g) {
        const dt = (performance.now() - g.at) / 1000;
        ex = g.x + g.dx * fireballSpeedAt(g.spd) * dt;
        ey = g.y + g.dy * fireballSpeedAt(g.spd) * dt;
      }
      // with fog of war, an enemy ball leaving our vision also vanishes from
      // snapshots — don't fake an explosion at the fog edge
      if (f.o !== myId) {
        const me = predicted || latestPlayer(myId);
        const meNow = latestPlayer(myId);
        if (me && meNow && meNow.a && !pointVisible(me.x, me.y, ex, ey)) continue;
      }
      explosions.push({ x: ex, y: ey, at: performance.now() });
    }
    prevFireballs = msg.fireballs;
    for (const id of ghostById.keys()) if (!liveIds.has(id)) ghostById.delete(id);
    for (const id of seenMyFireballs) if (!liveIds.has(id)) seenMyFireballs.delete(id);
    for (const bolt of (msg.bolts || [])) {
      lightningBolts.push({ sx: bolt.sx, sy: bolt.sy, ex: bolt.ex, ey: bolt.ey, at: performance.now() });
      if (bolt.v) {
        knocks.push({ v: bolt.v, kvx: bolt.dx * bolt.kb, kvy: bolt.dy * bolt.kb, hitTime: msg.now, visStart: performance.now() });
        if (bolt.v === myId) { jolts++; lastJoltAt = performance.now(); }
      }
    }
    for (const b of (msg.sblocks || [])) {
      shieldPops.push({ x: b.x, y: b.y, at: performance.now() });
    }
  }
  else if (msg.t === 'arena') pillars = msg.pillars || [];
  else if (msg.t === 'tuning') applyTuning(msg.tuning);
  else if (msg.t === 'pong') {
    const sample = performance.now() - msg.c;
    rtt = rtt ? rtt * 0.8 + sample * 0.2 : sample;
  }
};
ws.onclose = () => { statusEl.textContent = 'Disconnected from server'; };

// --- input ---
const keys = { up: false, down: false, left: false, right: false, shield: false };
const keymap = { w: 'up', s: 'down', a: 'left', d: 'right',
                 ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
let dashQueued = false;
let restartAt = 0;
addEventListener('keydown', (e) => {
  if (e.key === ' ') { dashQueued = true; e.preventDefault(); return; }
  if (e.key === 'f' || e.key === 'F') { castDeflect(); e.preventDefault(); return; }
  if (e.key === 'e' || e.key === 'E') { spawnTurret(); e.preventDefault(); return; }
  if (e.key === 'g' || e.key === 'G') { spawnDummy(); e.preventDefault(); return; }
  if (e.key === 'z' || e.key === 'Z') { keys.shield = true; e.preventDefault(); return; }
  if (e.key === 'r' || e.key === 'R') {
    if (ws.readyState === 1 && performance.now() - restartAt > 800) {
      restartAt = performance.now();
      ws.send(JSON.stringify({ t: 'restart' }));
    }
    return;
  }
  const k = keymap[e.key]; if (k) keys[k] = true;
});
addEventListener('keyup', (e) => {
  if (e.key === 'z' || e.key === 'Z') { keys.shield = false; return; }
  const k = keymap[e.key]; if (k) keys[k] = false;
});
// keyup events are lost when the tab loses focus, so release everything
function releaseKeys() {
  for (const k in keys) keys[k] = false;
  dashQueued = false;
  if (chargeHeld) releaseCharge();
}
addEventListener('blur', releaseKeys);
document.addEventListener('visibilitychange', () => { if (document.hidden) releaseKeys(); });

// --- client-side prediction ---
// Physics values: must match server.js exactly; live-updated via tuning sync
const TICK_RATE = 30, DT = 1 / TICK_RATE;
let MOVE_SPEED = 190, FRICTION = 3.2;
let PILLAR_BOUNCE = 0.3, PILLAR_SLIDE = 0.15;
let DASH_SPEED = 700, DASH_COOLDOWN = 0, CAST_COOLDOWN = 0.6;
let FIREBALL_SPEED = 420;
const CHARGE_MAX = 1.5, CHARGE_MIN_SPEED = 0.5, CHARGE_MAX_SPEED = 2.0, CHARGE_WALK_MIN = 0.35;
function chargeSpeedMult(t) {
  const r = Math.min(1, Math.max(0, t / CHARGE_MAX));
  return CHARGE_MIN_SPEED + (CHARGE_MAX_SPEED - CHARGE_MIN_SPEED) * r;
}
function chargeWalkMult(t) {
  const r = Math.min(1, Math.max(0, t / CHARGE_MAX));
  return 1 + (CHARGE_WALK_MIN - 1) * r;
}
function fireballSpeedAt(spd) { return FIREBALL_SPEED * (spd || 1); }

const LIGHTNING_HIT_R = 12, LIGHTNING_CD = 1.0, LIGHTNING_BOLT_MS = 90;
let DEFLECT_CD = 0.55, DEFLECT_DURATION = 0.16, DEFLECT_ARC = Math.PI * 0.7, DEFLECT_REACH = 52;
let TURRET_CD = 3, TURRET_INTERVAL = 1.4, TURRET_MAX = 3, TURRET_R = 14;
let DUMMY_CD = 1, DUMMY_MAX = 3, DUMMY_HP = 100, DUMMY_R = 16;
let SHIELD_ARC = Math.PI * 2 / 3, SHIELD_LOCK = 0.25, SHIELD_KB_MULT = 0.4;
function predictLightningEnd(ox, oy, tx, ty) {
  let dx = tx - ox, dy = ty - oy;
  const maxDist = Math.hypot(dx, dy);
  if (maxDist < 1e-6) return { sx: ox, sy: oy, ex: ox, ey: oy };
  dx /= maxDist; dy /= maxDist;
  let endDist = maxDist;
  for (const pl of pillars) {
    const minX = pl.x - pl.half, maxX = pl.x + pl.half;
    const minY = pl.y - pl.half, maxY = pl.y + pl.half;
    let tmin = 0, tmax = endDist;
    if (Math.abs(dx) < 1e-9) { if (ox < minX || ox > maxX) continue; }
    else {
      const t1 = (minX - ox) / dx, t2 = (maxX - ox) / dx;
      tmin = Math.max(tmin, Math.min(t1, t2));
      tmax = Math.min(tmax, Math.max(t1, t2));
    }
    if (Math.abs(dy) < 1e-9) { if (oy < minY || oy > maxY) continue; }
    else {
      const t1 = (minY - oy) / dy, t2 = (maxY - oy) / dy;
      tmin = Math.max(tmin, Math.min(t1, t2));
      tmax = Math.min(tmax, Math.max(t1, t2));
    }
    if (tmin > tmax || tmax < 0) continue;
    const hit = tmin >= 0 ? tmin : tmax;
    if (hit <= endDist) endDist = hit;
  }
  return { sx: ox, sy: oy, ex: ox + dx * endDist, ey: oy + dy * endDist };
}
function drawFireball(x, y, dx, dy, spd, t) {
  const angle = Math.atan2(dy, dx);
  const chargeScale = 1 + (spd ? (spd - 1) * 0.3 : 0);
  const r = fireballR * chargeScale;
  const pulse = 1 + Math.sin(t / 45) * 0.06;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // tail — stacked along flight axis, no lateral offset
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#ff3300';
  ctx.beginPath();
  ctx.ellipse(-r * 1.0, 0, r * 1.2 * pulse, r * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#ff6620';
  ctx.beginPath();
  ctx.ellipse(-r * 0.5, 0, r * 0.8, r * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();

  // main body
  const cx = r * 0.12;
  const grad = ctx.createRadialGradient(cx, 0, 0, cx, 0, r * 1.15);
  grad.addColorStop(0, '#fffce0');
  grad.addColorStop(0.35, '#ffd040');
  grad.addColorStop(0.7, '#ff6010');
  grad.addColorStop(1, 'rgba(200,30,0,0)');
  ctx.globalAlpha = 1;
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(cx, 0, r * 1.15, r * 0.72, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.ellipse(r * 0.2, 0, r * 0.32, r * 0.26, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function staffTipWorld(x, y, angle) {
  const size = playerR * 2.9;
  const scale = size / SPRITE_W;
  const ox = 7 * scale, oy = -12 * scale;
  const a = angle + Math.PI / 2;
  return {
    x: x + ox * Math.cos(a) - oy * Math.sin(a),
    y: y + ox * Math.sin(a) + oy * Math.cos(a)
  };
}

function drawStaffCharge(x, y, angle, chargeFrac, aimDx, aimDy, t) {
  const tip = staffTipWorld(x, y, angle);
  const len = Math.hypot(aimDx, aimDy) || 1;
  const s = 0.12 + chargeFrac * 0.45;
  ctx.save();
  ctx.translate(tip.x, tip.y);
  ctx.scale(s, s);
  drawFireball(0, 0, aimDx / len, aimDy / len, chargeSpeedMult(chargeFrac * CHARGE_MAX), t);
  ctx.restore();
}
function drawLightningBolt(x1, y1, x2, y2, alpha) {
  const segs = 8;
  const pts = [{ x: x1, y: y1 }];
  const px = -(y2 - y1), py = (x2 - x1), plen = Math.hypot(px, py) || 1;
  for (let i = 1; i < segs; i++) {
    const t = i / segs;
    const mx = x1 + (x2 - x1) * t, my = y1 + (y2 - y1) * t;
    const jitter = (Math.random() - 0.5) * 22 * (1 - Math.abs(t - 0.5) * 1.6);
    pts.push({ x: mx + px / plen * jitter, y: my + py / plen * jitter });
  }
  pts.push({ x: x2, y: y2 });
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#e8f4ff';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#80d4ff';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.2;
  ctx.shadowBlur = 0;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawDeflectSwing(x, y, angle, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#7dd3fc';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 0, playerR + 26, -DEFLECT_ARC / 2, DEFLECT_ARC / 2);
  ctx.stroke();
  ctx.restore();
}

function drawShield(x, y, angle, locked) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = locked ? 0.55 : 0.4;
  ctx.fillStyle = locked ? '#9ad4ff' : '#6eb6ff';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, playerR + 22, -SHIELD_ARC / 2, SHIELD_ARC / 2);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = locked ? 0.95 : 0.75;
  ctx.strokeStyle = '#e8f4ff';
  ctx.lineWidth = locked ? 3 : 2;
  ctx.beginPath();
  ctx.arc(0, 0, playerR + 22, -SHIELD_ARC / 2, SHIELD_ARC / 2);
  ctx.stroke();
  ctx.restore();
}

function applyShield(p, k) {
  const locked = (p.shieldLock || 0) > 0;
  const active = !!k.shield || locked;
  if (active) {
    const cl = Math.hypot(k.sdx, k.sdy);
    if (cl > 0) p.shieldAngle = Math.atan2(k.sdy / cl, k.sdx / cl);
    p.shieldUp = true;
  } else {
    p.shieldUp = false;
  }
}

function drawTurret(t, mine, pulse) {
  ctx.save();
  ctx.translate(t.x, t.y);
  ctx.rotate(t.a || 0);
  const r = TURRET_R;
  ctx.fillStyle = mine ? '#2a4858' : '#3a3048';
  ctx.strokeStyle = mine ? '#4fc3f7' : '#b388ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = pulse > 0.5 ? '#ffd54f' : '#ffb020';
  ctx.beginPath();
  ctx.arc(r * 0.55, 0, r * 0.35 * (0.85 + pulse * 0.15), 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawDummy(d, mine) {
  const r = DUMMY_R;
  ctx.save();
  ctx.globalAlpha = d.a ? 1 : 0.35;
  ctx.translate(d.x, d.y);
  ctx.fillStyle = mine ? '#5a3030' : '#4a2840';
  ctx.strokeStyle = mine ? '#ff8a65' : '#ce93d8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle = '#ffab91';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#ffccbc';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
  ctx.fill();
  if (d.a) {
    ctx.fillStyle = '#222';
    ctx.fillRect(-18, -r - 12, 36, 5);
    ctx.fillStyle = d.hp > 40 ? '#5be35b' : '#e3c15b';
    ctx.fillRect(-18, -r - 12, 36 * d.hp / DUMMY_HP, 5);
  }
  ctx.fillStyle = '#ddd';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(d.a ? 'Dummy' : '...', 0, -r - 16);
  ctx.restore();
}

const TUNABLES = [
  ['moveSpeed', 'Move speed', 50, 500, 5],
  ['friction', 'Friction', 0.5, 10, 0.1],
  ['dashSpeed', 'Dash speed', 0, 1500, 10],
  ['dashCooldown', 'Dash cooldown (s)', 0, 10, 0.1],
  ['castCooldown', 'Cast cooldown (s)', 0.05, 3, 0.05],
  ['fireballSpeed', 'Fireball speed', 100, 3000, 10],

function stepPlayer(p, k, dt) {
  let mx = 0, my = 0;
  if (!p.shieldUp) {
    if (k.up) my -= 1;
    if (k.down) my += 1;
    if (k.left) mx -= 1;
    if (k.right) mx += 1;
  }
  const len = Math.hypot(mx, my);
  if (len > 0) { mx /= len; my /= len; }
  p.dashCd = Math.max(0, (p.dashCd || 0) - dt);
  if (!p.shieldUp && k.dash && p.dashCd === 0 && len > 0) {
    p.vx += mx * DASH_SPEED;
    p.vy += my * DASH_SPEED;
    p.dashCd = DASH_COOLDOWN;
  }
  const walkMult = p.charging ? chargeWalkMult(p.chargeTime || 0) : 1;
  p.x += (mx * MOVE_SPEED * walkMult + p.vx) * dt;
  p.y += (my * MOVE_SPEED * walkMult + p.vy) * dt;
  const decay = Math.exp(-FRICTION * dt);
  p.vx *= decay; p.vy *= decay;
  // must match server.js exactly: axis pushout + reflected bounce
  for (const pl of pillars) {
    const e = pl.half + playerR;
    const dx = p.x - pl.x, dy = p.y - pl.y;
    if (Math.abs(dx) < e && Math.abs(dy) < e) {
      const ox = e - Math.abs(dx), oy = e - Math.abs(dy);
      if (ox <= oy) {
        p.x = pl.x + (dx < 0 ? -e : e);
        p.vx = -p.vx * PILLAR_BOUNCE;
        p.vy *= PILLAR_SLIDE;
      } else {
        p.y = pl.y + (dy < 0 ? -e : e);
        p.vy = -p.vy * PILLAR_BOUNCE;
        p.vx *= PILLAR_SLIDE;
      }
    }
  }
  p.x = Math.min(world - playerR, Math.max(playerR, p.x));
  p.y = Math.min(world - playerR, Math.max(playerR, p.y));
}

// reconcile against an authoritative snapshot of my player
function reconcile(me) {
  if (!predicted || me.seq === undefined) return;
  pending = pending.filter(i => i.seq > me.seq);
  const auth = {
    x: me.x, y: me.y, vx: me.vx || 0, vy: me.vy || 0, dashCd: me.dcd || 0,
    charging: false, chargeTime: 0, shieldUp: !!me.shu, shieldAngle: me.sha || 0,
    shieldLock: me.shl || 0

  for (const i of pending) {
    if (i.keys.charge) {
      if (!auth.charging) { auth.charging = true; auth.chargeTime = 0; }
      auth.chargeTime = Math.min(CHARGE_MAX, auth.chargeTime + DT);
    } else if (auth.charging) {
      auth.charging = false;
      auth.chargeTime = 0;
    }
    applyShield(auth, i.keys);
    stepPlayer(auth, i.keys, DT);
  }
  const dx = predicted.x - auth.x, dy = predicted.y - auth.y;
  const dv = Math.hypot(predicted.vx - auth.vx, predicted.vy - auth.vy);
  if (Math.hypot(dx, dy) > SNAP_DIST) {
    errX = 0; errY = 0;                 // hard snap
    // respawn teleports also land here; only mid-round snaps are anomalies
    const s = snaps[snaps.length - 1];
    if (s && s.round.state === 'playing') hardSnaps++;
  } else if (dv < IMPULSE_VEL) {
    errX += dx; errY += dy;             // fold difference into visual error
  } else {
    // a knockback landed — let the jolt through unsmoothed
    jolts++; lastJoltAt = performance.now();
  }
  if (predictedPrev) { predictedPrev.x -= dx; predictedPrev.y -= dy; }
  predicted = auth;
  if (me.chg > 0 && !chargeHeld) {
    predicted.charging = true;
    predicted.chargeTime = me.chg;
  }
}

// my warlock's on-screen position: predicted steps lerped for smooth
// rendering, plus the visual error offset. Shared by camera and draw.
function myRenderPos() {
  if (!predicted) return null;
  let px = predicted.x, py = predicted.y;
  if (predictedPrev) {
    const alpha = Math.min(1, (performance.now() - lastStepAt) / (1000 / TICK_RATE));
    px = predictedPrev.x + (predicted.x - predictedPrev.x) * alpha;
    py = predictedPrev.y + (predicted.y - predictedPrev.y) * alpha;
  }
  return { x: px + errX, y: py + errY };

// --- interpolation ---
function interpolated() {
  if (snaps.length === 0) return null;
  const renderTime = Date.now() + clockOffset - INTERP_DELAY;
  let a = snaps[0], b = snaps[snaps.length - 1];
  for (let i = snaps.length - 1; i >= 1; i--) {
    if (snaps[i - 1].now <= renderTime) { a = snaps[i - 1]; b = snaps[i]; break; }
  }
  const span = b.now - a.now;
  const t = span > 0 ? Math.min(1, Math.max(0, (renderTime - a.now) / span)) : 1;

  const players = b.players.map(pb => {
    const pa = a.players.find(p => p.id === pb.id) || pb;
    return { ...pb, x: pa.x + (pb.x - pa.x) * t, y: pa.y + (pb.y - pa.y) * t };
  });
  // Fireballs fly in straight lines at constant speed, so position them
  // analytically at renderTime — same timeline as players, smooth at any fps.
  const fireballs = b.fireballs.map(fb => {
    const dt = (renderTime - b.now) / 1000;
    return { id: fb.id, o: fb.o, dx: fb.dx, dy: fb.dy,
      x: fb.x + fb.dx * fireballSpeedAt(fb.spd) * dt, y: fb.y + fb.dy * fireballSpeedAt(fb.spd) * dt, spd: fb.spd };
  });
  const round = { ...b.round, arenaR: a.round.arenaR + (b.round.arenaR - a.round.arenaR) * t };
  const turrets = b.turrets || [];
  const dummies = b.dummies || [];
  return { players, fireballs, turrets, dummies, round, renderTime };
}

// --- fog of war ---
// The server already filters entities you can't see; this draws the visual
// half: a dark overlay with a lit polygon shadowcast from your warlock.
const FOG_BASE_RAYS = 90;
function rayPillarDist(ox, oy, dx, dy, maxDist, blocks) {
  let best = maxDist;
  for (const pl of blocks) {
    const minX = pl.x - pl.half, maxX = pl.x + pl.half;
    const minY = pl.y - pl.half, maxY = pl.y + pl.half;
    let tmin = 0, tmax = best;
    if (Math.abs(dx) < 1e-9) { if (ox < minX || ox > maxX) continue; }
    else {
      const t1 = (minX - ox) / dx, t2 = (maxX - ox) / dx;
      tmin = Math.max(tmin, Math.min(t1, t2));
      tmax = Math.min(tmax, Math.max(t1, t2));
    }
    if (Math.abs(dy) < 1e-9) { if (oy < minY || oy > maxY) continue; }
    else {
      const t1 = (minY - oy) / dy, t2 = (maxY - oy) / dy;
      tmin = Math.max(tmin, Math.min(t1, t2));
      tmax = Math.min(tmax, Math.max(t1, t2));
    }
    if (tmin > tmax || tmax < 0) continue;
    const hit = tmin >= 0 ? tmin : tmax;
    if (hit < best) best = hit;
  }
  return best;
}

function pointVisible(vx, vy, x, y) {
  const d = Math.hypot(x - vx, y - vy);
  if (d > VISION_R) return false;
  if (d < 1e-6) return true;
  return rayPillarDist(vx, vy, (x - vx) / d, (y - vy) / d, d, pillars) >= d;
}

function drawFog(px, py) {
  const nearby = pillars.filter(pl =>
    Math.hypot(pl.x - px, pl.y - py) < VISION_R + pl.half * 2);

  // Cast rays exactly at every wall corner (plus a hair to either side, so
  // one ray stops at the corner and the twin slips past it), and a coarse
  // fan for the smooth vision circle in open directions. This makes shadow
  // silhouettes track the geometry exactly instead of snapping between
  // fixed angular steps, so the fog sweeps smoothly as you move.
  const angles = [];
  for (let i = 0; i < FOG_BASE_RAYS; i++) angles.push((i / FOG_BASE_RAYS) * Math.PI * 2 - Math.PI);
  const EPS = 5e-4;
  for (const pl of nearby) {
    for (const [cx, cy] of [
      [pl.x - pl.half, pl.y - pl.half], [pl.x + pl.half, pl.y - pl.half],
      [pl.x - pl.half, pl.y + pl.half], [pl.x + pl.half, pl.y + pl.half]
    ]) {
      if (Math.hypot(cx - px, cy - py) > VISION_R) continue;
      const a = Math.atan2(cy - py, cx - px);
      angles.push(a - EPS, a, a + EPS);
    }
  }
  angles.sort((a, b) => a - b);

  fctx.setTransform(1, 0, 0, 1, 0, 0);
  fctx.globalCompositeOperation = 'source-over';
  fctx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
  fctx.fillStyle = 'rgba(6, 6, 14, 0.88)';
  fctx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);
  fctx.setTransform(view.scale, 0, 0, view.scale, view.ox, view.oy);
  fctx.globalCompositeOperation = 'destination-out';
  const grad = fctx.createRadialGradient(px, py, 0, px, py, VISION_R);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.7, 'rgba(255,255,255,1)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  fctx.fillStyle = grad;
  fctx.beginPath();
  let first = true;
  for (const a of angles) {
    const dx = Math.cos(a), dy = Math.sin(a);
    // extend a touch past the hit so the blocking wall's face stays lit
    const d = Math.min(VISION_R, rayPillarDist(px, py, dx, dy, VISION_R, nearby) + 24);
    if (first) { fctx.moveTo(px + dx * d, py + dy * d); first = false; }
    else fctx.lineTo(px + dx * d, py + dy * d);
  }
  fctx.closePath();
  fctx.fill();
  ctx.drawImage(fogCanvas, 0, 0);
}

function draw() {

  ctx.setTransform(1, 0, 0, 1, 0, 0); // never inherit a stale transform
  ctx.fillStyle = '#0b0b12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const state = interpolated();
  if (!state) return;

  const nowMs = performance.now();
  const dtFrame = Math.min(0.1, (nowMs - lastFrameAt) / 1000);
  lastFrameAt = nowMs;

  // camera: follow my warlock, smoothed, clamped to the world edges
  const meSnap = state.players.find(p => p.id === myId);
  const target = myRenderPos() || meSnap || cam || center;
  if (!cam) cam = { x: target.x, y: target.y };
  const camK = 1 - Math.exp(-8 * dtFrame);
  cam.x += (target.x - cam.x) * camK;
  cam.y += (target.y - cam.y) * camK;

  view.scale = Math.min(canvas.width, canvas.height) / VIEW_WORLD;
  const halfW = canvas.width / 2 / view.scale;
  const halfH = canvas.height / 2 / view.scale;
  const cx = halfW * 2 >= world ? world / 2 : Math.min(world - halfW, Math.max(halfW, cam.x));
  const cy = halfH * 2 >= world ? world / 2 : Math.min(world - halfH, Math.max(halfH, cam.y));
  view.ox = canvas.width / 2 - cx * view.scale;
  view.oy = canvas.height / 2 - cy * view.scale;

  ctx.translate(view.ox, view.oy);
  ctx.scale(view.scale, view.scale);

  ctx.fillStyle = '#7a1f0f';
  ctx.fillRect(0, 0, world, world);

  // safe ground
  ctx.beginPath();
  ctx.arc(center.x, center.y, state.round.arenaR, 0, Math.PI * 2);
  ctx.fillStyle = '#3d3a33';
  ctx.fill();
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#ff5a1f';
  ctx.beginPath();
  ctx.arc(center.x, center.y, state.round.arenaR + bubble, 0, Math.PI * 2);
  ctx.stroke();

    const s = pl.half * 2;
    ctx.fillStyle = '#59544a';
    ctx.fillRect(pl.x - pl.half, pl.y - pl.half, s, s);
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#2e2b26';
    ctx.strokeRect(pl.x - pl.half, pl.y - pl.half, s, s);
    ctx.fillStyle = 'rgba(255,255,255,.07)';
    ctx.fillRect(pl.x - pl.half * 0.7, pl.y - pl.half * 0.7, s * 0.45, s * 0.45);
  }

  const turretPulse = 0.5 + Math.sin(nowMs / (TURRET_INTERVAL * 500)) * 0.5;
  for (const t of (state.turrets || [])) {
    drawTurret(t, t.o === myId, turretPulse);
  }
  for (const d of (state.dummies || [])) {
    drawDummy(d, d.o === myId);
  }

  // fireballs (server-confirmed + predicted ghosts)
  ghosts = ghosts.filter(g => nowMs - g.at < 800); // safety net if a cast was rejected
  const balls = [];
  for (const f of state.fireballs) {
    if (scheduledHits.some(h => h.fid === f.id)) continue;
    // player casts use ghost trajectories; turret shots and others use server state
    if (f.o === myId && ghostById.has(f.id)) continue;
    balls.push(f);
  }
  // matches server stepFireball: charge-scaled radius, and pillars overlapped
  // at spawn don't detonate until the ball's center enters the pillar body
  // or it flies clear of them
  function ghostHitsPillar(g, x, y) {
    const gr = fireballR * (1 + ((g.spd || 1) - 1) * 0.3);
    for (const pl of pillars) {
      const inside = Math.abs(x - pl.x) < pl.half + gr && Math.abs(y - pl.y) < pl.half + gr;
      if (g.clip && g.clip.has(pl)) {
        if (Math.abs(x - pl.x) < pl.half && Math.abs(y - pl.y) < pl.half) return true;
        if (!inside) g.clip.delete(pl);
        continue;
      }
      if (inside) return true;
    }
    return false;
  }
  // own fireballs (confirmed or not): detonate against pillars locally so the
  // splash is instant instead of waiting for the server's vanish to round-trip
  for (const [fid, g] of ghostById) {
    const dt = (nowMs - g.at) / 1000;
    const spd = fireballSpeedAt(g.spd);
    const x = g.x + g.dx * spd * dt, y = g.y + g.dy * spd * dt;
    if (ghostHitsPillar(g, x, y)) {
      explosions.push({ x, y, at: nowMs });
      hitIds.add(fid); // suppress the duplicate vanish explosion later
      ghostById.delete(fid);
      continue;
    }
    balls.push({ x, y, dx: g.dx, dy: g.dy, spd: g.spd });
  }
  // unconfirmed ghosts: a ball that dies on the server before its first
  // snapshot never confirms, so it must still explode on walls locally.
  // Dead ghosts stay in the queue so FIFO pairing with confirmations holds.
  for (const g of ghosts) {
    if (g.dead) continue;
    const dt = (nowMs - g.at) / 1000;
    const spd = fireballSpeedAt(g.spd);
    const x = g.x + g.dx * spd * dt, y = g.y + g.dy * spd * dt;
    if (ghostHitsPillar(g, x, y)) {
      explosions.push({ x, y, at: nowMs });
      g.dead = true;
      continue;
    }
    balls.push({ x, y, dx: g.dx, dy: g.dy, spd: g.spd });
  }
  // spectated hits: fly the ball to the impact point, detonate on arrival
  scheduledHits = scheduledHits.filter(h => {
    if (state.renderTime >= h.hitTime) {
      explosions.push({ x: h.x, y: h.y, at: nowMs });
      const m = pendingMeasures.find(pm => pm.fid === h.fid);
      if (m) { m.boomAt = nowMs; m.knockAt = nowMs; }
      return false;
    }
    const dt = (h.hitTime - state.renderTime) / 1000;
    balls.push({ x: h.x - h.dx * fireballSpeedAt(h.spd) * dt, y: h.y - h.dy * fireballSpeedAt(h.spd) * dt, dx: h.dx, dy: h.dy, spd: h.spd });
    return true;
  });
  for (const f of balls) {
    const dx = f.dx ?? 1, dy = f.dy ?? 0;
    drawFireball(f.x, f.y, dx, dy, f.spd, nowMs);
  }

  // impact explosions
  explosions = explosions.filter(e => nowMs - e.at < 280);
  for (const e of explosions) {
    const age = (nowMs - e.at) / 280;
    ctx.globalAlpha = 1 - age;
    ctx.beginPath();
    ctx.arc(e.x, e.y, 10 + age * 26, 0, Math.PI * 2);
    ctx.fillStyle = '#ff8030';
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  shieldPops = shieldPops.filter(p => nowMs - p.at < 200);
  for (const p of shieldPops) {
    const age = (nowMs - p.at) / 200;
    ctx.globalAlpha = 1 - age;
    ctx.strokeStyle = '#b8ecff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8 + age * 18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  lightningBolts = lightningBolts.filter(b => nowMs - b.at < LIGHTNING_BOLT_MS);
  for (const b of lightningBolts) {
    const age = (nowMs - b.at) / LIGHTNING_BOLT_MS;
    drawLightningBolt(b.sx, b.sy, b.ex, b.ey, 1 - age);
    if (age < 0.25) {
      ctx.globalAlpha = (1 - age / 0.25) * 0.55;
      ctx.beginPath();
      ctx.arc(b.ex, b.ey, LIGHTNING_HIT_R * (0.6 + age), 0, Math.PI * 2);
      ctx.fillStyle = '#b8ecff';
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  for (const p of state.players) {
    if (!p.a || !(p.dft > 0)) continue;
    let px = p.x, py = p.y;
    if (p.id === myId) {
      const rp = myRenderPos();
      if (rp) { px = rp.x; py = rp.y; }
    }
    drawDeflectSwing(px, py, p.dfa || 0, p.dft / DEFLECT_DURATION);
  }

  // decay visual correction error (framerate-independent)
  const errDecay = Math.exp(-8 * dtFrame);
  errX *= errDecay; errY *= errDecay;
  if (dtFrame > 0) fpsEma = fpsEma * 0.95 + (1 / dtFrame) * 0.05;
  maxErrMag = Math.max(maxErrMag, Math.hypot(errX, errY));

  knocks = knocks.filter(k => (state.renderTime - k.hitTime) / 1000 < 1.5);

  // players
  for (let p of state.players) {
    const mine = p.id === myId;
    // early knockback from our own hits: show the impulse displacement now,
    // minus the part interpolation already includes, so it blends to zero
    for (const k of knocks) {
      if (k.v !== p.id) continue;
      const ev = (nowMs - k.visStart) / 1000;
      const er = Math.max(0, (state.renderTime - k.hitTime) / 1000);
      const d = ((1 - Math.exp(-FRICTION * ev)) - (1 - Math.exp(-FRICTION * er))) / FRICTION;
      p = { ...p, x: p.x + k.kvx * d, y: p.y + k.kvy * d };
    }
    if (mine && p.a) {
      const rp = myRenderPos();
      if (rp) p = { ...p, x: rp.x, y: rp.y };
    }
    ctx.globalAlpha = p.a ? 1 : 0.25;
    drawWarlock(p.x, p.y, playerFacing(), playerAnimFrame(p, mine), mine, p.a ? 1 : 0.25);

    const shieldOn = mine
      ? (predicted && predicted.shieldUp) || p.shu
      : p.shu;
    const shieldAngle = mine && predicted && predicted.shieldUp ? predicted.shieldAngle : (p.sha || 0);
    const shieldLocked = mine
      ? (predicted && (predicted.shieldLock || 0) > 0) || (p.shl || 0) > 0
      : (p.shl || 0) > 0;
    if (shieldOn && p.a) drawShield(p.x, p.y, shieldAngle, shieldLocked);

    const chg = mine
      ? (chargeHeld ? Math.min(CHARGE_MAX, (nowMs - chargeStartAt) / 1000) : (predicted && predicted.charging ? predicted.chargeTime : 0))
      : (p.chg || 0);
    if (chg > 0 && p.a) {
      const frac = chg / CHARGE_MAX;
      const aimDx = mine && chargeHeld ? chargeAim.dx : 0;
      const aimDy = mine && chargeHeld ? chargeAim.dy : -1;
      drawStaffCharge(p.x, p.y, playerFacing(), frac, aimDx, aimDy, nowMs);
    }

    // hp bar
    if (p.a) {
      ctx.fillStyle = '#222';
      ctx.fillRect(p.x - 20, p.y - playerR - 14, 40, 6);
      ctx.fillStyle = p.hp > 40 ? '#5be35b' : '#e3c15b';
      ctx.fillRect(p.x - 20, p.y - playerR - 14, 40 * p.hp / 100, 6);
    }
    ctx.fillStyle = '#fff';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${p.n} (${p.w})`, p.x, p.y - playerR - 18);
    ctx.globalAlpha = 1;
  }

  // finalize hit measurements once effects have had time to render
  pendingMeasures = pendingMeasures.filter(m => {
    if (nowMs - m.procAt < 1500) return true;
    if (m.contactAt === null) { noContact++; return false; }
    if (m.knockAt === null) noKnock++;
    const arr = hitSamples[m.role];
    arr.push({
      boom: m.boomAt === null ? null : Math.round(m.boomAt - m.contactAt),
      knock: m.knockAt === null ? null : Math.round(m.knockAt - m.contactAt)
    });
    if (arr.length > 60) arr.shift();
    return false;
  });

  ctx.restore();

  if (state.round.state === 'playing' && meSnap && meSnap.a) {
    const rp = myRenderPos() || meSnap;
    drawFog(rp.x, rp.y);
  }

  drawCooldownHud(state);

  // status text
  const r = state.round;
  if (r.state === 'ended') statusEl.textContent = r.winner ? `${r.winner} wins the round!` : 'Round over';
  else if (r.state === 'lobby') statusEl.textContent = 'Waiting for players...';
  else {
    const me = state.players.find(p => p.id === myId);
    statusEl.textContent = me && !me.a ? 'You died — spectating' : '';
  }
}
function drawCooldownHud(state) {
  const me = state.players.find(p => p.id === myId);
  if (!me || !me.a) return;

  const fbRemain = Math.max(me.cd || 0, (castCdEnd - performance.now()) / 1000, 0);
  const ltRemain = Math.max(me.lcd || 0, (lightningCdEnd - performance.now()) / 1000, 0);
  const dfRemain = Math.max(me.dfcd || 0, (deflectCdEnd - performance.now()) / 1000, 0);
  const trRemain = Math.max(me.tcd || 0, (turretCdEnd - performance.now()) / 1000, 0);
  const dmRemain = Math.max(me.ycd || 0, (dummyCdEnd - performance.now()) / 1000, 0);
  const dashRemain = predicted ? (predicted.dashCd || 0) : (me.dcd || 0);
  const chgFrac = chargeHeld ? Math.min(1, (performance.now() - chargeStartAt) / 1000 / CHARGE_MAX) : 0;
  const snap = snaps[snaps.length - 1];
  const turretCount = (snap?.turrets || []).filter(t => t.o === myId).length;
  const dummyCount = (snap?.dummies || []).filter(d => d.o === myId).length;

  const slots = [
    { label: 'LMB', name: 'Fireball', remain: fbRemain, total: CAST_COOLDOWN, charge: chgFrac },
    { label: 'RMB', name: 'Lightning', remain: ltRemain, total: LIGHTNING_CD },
    { label: 'F', name: 'Deflect', remain: dfRemain, total: DEFLECT_CD },
    { label: 'E', name: 'Turret', remain: trRemain, total: TURRET_CD, count: turretCount, max: TURRET_MAX },
    { label: 'G', name: 'Dummy', remain: dmRemain, total: DUMMY_CD, count: dummyCount, max: DUMMY_MAX },
    { label: 'Z', name: 'Shield', remain: 0, total: 1, held: keys.shield || (predicted && predicted.shieldUp) },
    { label: 'SPC', name: 'Dash', remain: dashRemain, total: DASH_COOLDOWN }
  ];

  const size = 56, gap = 14;
  const totalW = slots.length * size + (slots.length - 1) * gap;
  let x = (canvas.width - totalW) / 2;
  const y = canvas.height - size - 18;

  for (const s of slots) {
    ctx.fillStyle = 'rgba(20,20,30,.85)';
    ctx.fillRect(x, y, size, size);

    // icon
    if (s.name === 'Fireball') {
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, 10 + (s.charge || 0) * 5, 0, Math.PI * 2);
      ctx.fillStyle = s.charge ? `rgb(255, ${Math.round(120 + 135 * s.charge)}, 32)` : '#ffb020';
      ctx.fill();
    } else if (s.name === 'Lightning') {
      ctx.strokeStyle = '#80d4ff';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = '#80d4ff';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(x + size / 2 - 8, y + 14);
      ctx.lineTo(x + size / 2 + 2, y + size / 2);
      ctx.lineTo(x + size / 2 - 4, y + size / 2);
      ctx.lineTo(x + size / 2 + 8, y + size - 14);
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else if (s.name === 'Deflect') {
      ctx.strokeStyle = '#4fc3f7';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2 + 4, 14, -Math.PI * 0.55, Math.PI * 0.1);
      ctx.stroke();
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x + size / 2 + 10, y + size / 2 - 6);
      ctx.lineTo(x + size / 2 + 18, y + size / 2 + 2);
      ctx.stroke();
    } else if (s.name === 'Turret') {
      ctx.fillStyle = '#2a4858';
      ctx.strokeStyle = '#4fc3f7';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#ffb020';
      ctx.beginPath();
      ctx.arc(x + size / 2 + 7, y + size / 2, 5, 0, Math.PI * 2);
      ctx.fill();
      if (s.count != null) {
        ctx.fillStyle = '#bbb';
        ctx.font = '10px sans-serif';
        ctx.fillText(`${s.count}/${s.max}`, x + size / 2, y + 8);
      }
    } else if (s.name === 'Dummy') {
      ctx.fillStyle = '#5a3030';
      ctx.strokeStyle = '#ff8a65';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = '#ffab91';
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#ffccbc';
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, 2.5, 0, Math.PI * 2);
      ctx.fill();
      if (s.count != null) {
        ctx.fillStyle = '#bbb';
        ctx.font = '10px sans-serif';
        ctx.fillText(`${s.count}/${s.max}`, x + size / 2, y + 8);
      }
    } else if (s.name === 'Shield') {
      ctx.fillStyle = s.held ? '#6eb6ff' : '#3a5070';
      ctx.strokeStyle = '#e8f4ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2 + 2, 14, -SHIELD_ARC / 2, SHIELD_ARC / 2);
      ctx.fill();
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#4fc3f7';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x + 14, y + size - 18);
      ctx.lineTo(x + size - 20, y + 20);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + size - 20, y + 20);
      ctx.lineTo(x + size - 28, y + 22);
      ctx.moveTo(x + size - 20, y + 20);
      ctx.lineTo(x + size - 22, y + 28);
      ctx.stroke();
    }

    // cooldown overlay sweeping down as it recovers
    if (s.remain > 0) {
      const frac = Math.min(1, s.remain / s.total);
      ctx.fillStyle = 'rgba(0,0,0,.65)';
      ctx.fillRect(x, y, size, size * frac);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(s.remain.toFixed(1), x + size / 2, y + size / 2 + 6);
    }

    ctx.strokeStyle = s.remain > 0 ? '#555' : '#ffd54f';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, size, size);

    ctx.fillStyle = '#bbb';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(s.label, x + size / 2, y + size + 13);

    x += size + gap;
  }
}
draw();
</script>
</body>
